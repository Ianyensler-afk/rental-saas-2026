<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 房東收益決策儀表板 | SaaS Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .highlight-row { background-color: #f0f9ff; font-weight: 800; color: #1e40af; }
        .base-row { background-color: #f8fafc; font-weight: 700; color: #1e293b; }
        .rent-row { background-color: #fffbeb; font-weight: 800; color: #78350f; }
        .withhold-row { color: #991b1b; font-style: italic; font-weight: 700; font-size: 0.95rem; }
        .label-style { font-size: 1.05rem; color: #374151; font-weight: 700; }
        .label-final { font-size: 1.15rem; color: #111827; font-weight: 800; }
        td, th { padding: 10px 16px !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans antialiased text-slate-900">

    <nav class="bg-slate-900 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-calculator text-blue-400 text-2xl"></i>
                <span class="text-xl font-black tracking-tighter uppercase">Rental Profit <span class="text-blue-400 text-sm">SaaS PRO</span></span>
            </div>
            <div class="text-xs font-bold text-slate-400">Version 2026.03 | Q1 Updated</div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <aside class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="text-sm font-black text-slate-800 mb-6 uppercase border-b pb-2">參數設定</h3>
                    <div class="space-y-4">
                        <div class="p-4 bg-orange-50 rounded-2xl border border-orange-100">
                            <span class="text-[10px] font-black text-orange-600 uppercase">軌道 A：社宅/公益/自租</span>
                            <div class="grid grid-cols-2 gap-4 mt-2">
                                <input type="number" id="rentA" value="29000" class="w-full p-2 rounded-lg border border-slate-200 font-bold" title="月租金">
                                <input type="number" id="taxRateA" value="12" class="w-full p-2 rounded-lg border border-slate-200 font-bold" title="稅率">
                            </div>
                        </div>
                        <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                            <span class="text-[10px] font-black text-blue-600 uppercase">軌道 B：法人/代管</span>
                            <div class="grid grid-cols-2 gap-4 mt-2">
                                <input type="number" id="rentB" value="40000" class="w-full p-2 rounded-lg border border-slate-200 font-bold" title="月租金">
                                <input type="number" id="taxRateB" value="20" class="w-full p-2 rounded-lg border border-slate-200 font-bold" title="稅率">
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <div class="lg:col-span-8 space-y-6">
                <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200">
                    <div id="tableContainer" class="overflow-x-auto min-h-[400px]">
                        <div class="flex items-center justify-center p-20 text-slate-400">
                            <i class="fas fa-spinner fa-spin mr-2"></i> 正在初始化計算模組...
                        </div>
                    </div>
                </div>
                <div class="bg-slate-100 p-6 rounded-2xl text-[10px] text-slate-500">
                    <p>⚖️ <strong>免責聲明：</strong> 本工具僅供試算參考，實際稅額以國稅局及稅捐稽徵處發出之稅單為準。</p>
                </div>
            </div>
        </div>
    </main>

<script>
// 確保 DOM 載入後才執行
window.onload = function() {
    console.log("Rental SaaS Initializing...");
    
    function formatCurrency(num) { return Math.round(num).toLocaleString(); }

    function calculate() {
        try {
            const rentA = parseFloat(document.getElementById('rentA').value) || 0;
            const taxA = (parseFloat(document.getElementById('taxRateA').value) || 0) / 100;
            const rentB = parseFloat(document.getElementById('rentB').value) || 0;
            const taxB = (parseFloat(document.getElementById('taxRateB').value) || 0) / 100;
            const hValue = 600000; const lValue = 500000; 

            const modes = [
                { name: "社會住宅 (代管)", mRent: rentA * 0.9, rate: taxA, type: 'sh' },
                { name: "公益出租人", mRent: rentA, rate: taxA, type: 'pi' },
                { name: "房東自租自管", mRent: rentA, rate: taxA, type: 'self' },
                { name: "大管家代管 (法人)", mRent: rentB, rate: taxB, type: 'big_m' },
                { name: "橘公寓代管 (法人)", mRent: rentB, rate: taxB, type: 'orange' }
            ];

            let html = `<table class="w-full text-left min-w-[800px]">
                <thead class="bg-slate-900 text-white text-[11px] uppercase tracking-widest">
                    <tr><th class="p-4 border-r border-slate-800">分析細項</th>` + 
                    modes.map(m => `<th class="text-center p-4">${m.name}</th>`).join('') + 
                    `</tr></thead><tbody>`;

            const results = modes.map(m => {
                let taxableMonth = 0; let hTax = 0; let lTax = 0;
                let mgtFee = 0; let nhiFee = 0; let withholdTax = 0;

                if (m.type === 'sh') {
                    taxableMonth = Math.max(0, m.mRent - 15000) * 0.4;
                    hTax = hValue * 0.012; lTax = lValue * 0.002;
                } else if (m.type === 'pi') {
                    taxableMonth = Math.max(0, m.mRent - 15000) * 0.57;
                    hTax = hValue * 0.012; lTax = lValue * 0.002;
                } else if (m.type === 'self') {
                    taxableMonth = m.mRent * 0.57;
                    hTax = hValue * 0.024; lTax = lValue * 0.01;
                } else {
                    taxableMonth = Math.max(0, Math.min(m.mRent, 20000) - 6000) * 0.47 + Math.max(0, m.mRent - 20000) * 0.57;
                    hTax = hValue * 0.03; lTax = lValue * 0.01;
                    withholdTax = m.mRent * 12 * 0.1;
                    nhiFee = m.mRent * 12 * 0.0211;
                    mgtFee = (m.type === 'big_m') ? m.mRent * 0.1 * 12 : m.mRent;
                }

                const incomeTaxActual = taxableMonth * 12 * m.rate;
                const netProfit = (m.mRent * 12) - incomeTaxActual - hTax - lTax - mgtFee - nhiFee;
                return { mRent: m.mRent, gross: m.mRent * 12, withholdTax, nhiFee, incomeTaxActual, hTax, lTax, mgtFee, netProfit };
            });

            const rows = [
                { label: "📍 簽約月租金", key: "mRent", class: "rent-row", lStyle: "label-style" },
                { label: "年度總收入 (Gross)", key: "gross", class: "base-row border-b-2", lStyle: "label-style" },
                { label: "－ 法人預扣 (10%)", key: "withholdTax", class: "withhold-row", lStyle: "label-style" },
                { label: "－ 二代健保 (2.11%)", key: "nhiFee", class: "withhold-row", lStyle: "label-style" },
                { label: "年度所得稅額", key: "incomeTaxActual", color: "text-red-800 font-bold", lStyle: "label-style" },
                { label: "年度房屋稅", key: "hTax", color: "text-indigo-800 font-bold", lStyle: "label-style" },
                { label: "年度地價稅", key: "lTax", color: "text-purple-800 font-bold", lStyle: "label-style" },
                { label: "年度物管費", key: "mgtFee", color: "text-slate-700 font-bold", lStyle: "label-style" },
                { label: "💰 最終淨利 (稅後實拿)", key: "netProfit", class: "highlight-row", lStyle: "label-final", isFinal: true }
            ];

            rows.forEach(r => {
                html += `<tr class="border-b ${r.class || ''} transition-all hover:bg-slate-50">
                    <td class="${r.lStyle} border-r border-slate-100">${r.label}</td>` + 
                    results.map(res => {
                        const val = res[r.key];
                        const display = (val === 0) ? "-" : "$" + formatCurrency(val);
                        return `<td class="text-center font-bold ${r.color || ''} ${r.isFinal ? 'text-2xl font-black' : ''}">${display}</td>`;
                    }).join('') + `</tr>`;
            });

            document.getElementById('tableContainer').innerHTML = html + "</tbody></table>";
        } catch (err) {
            console.error(err);
            document.getElementById('tableContainer').innerHTML = `<div class="p-10 text-red-500 font-bold text-center">計算發生錯誤：${err.message}</div>`;
        }
    }

    document.querySelectorAll('input').forEach(el => el.addEventListener('input', calculate));
    calculate();
};
</script>
</body>
</html>
