<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 房東收益決策儀表板 | V17 專業版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Poppins:wght@600;800&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .font-number { font-family: 'Poppins', sans-serif; }

        /* --- 視覺與強制顯色 --- */
        .highlight-row { background-color: #f0f7ff !important; font-weight: 800; color: #1e40af !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .base-row { background-color: #f8fafc !important; font-weight: 700; color: #1e293b !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .rent-row { background-color: #fffbeb !important; font-weight: 800; color: #78350f !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        
        .income-tax { color: #b91c1c !important; font-weight: 800; }
        .house-tax { color: #3730a3 !important; font-weight: 800; }
        .land-tax { color: #6b21a8 !important; font-weight: 800; }
        
        /* 手機滑動優化 */
        .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; }

        /* --- 列印與分頁修正 --- */
        @media print {
            @page { size: A4 landscape; margin: 0; }
            html, body { width: 297mm; height: 210mm; overflow: hidden !important; }
            .no-print { display: none !important; }
            .print-area { width: 100% !important; padding: 1cm !important; transform: scale(0.85); transform-origin: top center; }
        }
    </style>
</head>
<body class="p-2 md:p-8">

    <div class="max-w-7xl mx-auto print-area">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 no-print">
            <div class="flex items-center gap-3">
                <div class="bg-slate-900 text-white p-3 rounded-2xl shadow-xl"><i class="fas fa-calculator text-2xl text-blue-400"></i></div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-black text-slate-800 tracking-tighter">房東收益決策儀表板 <span class="text-blue-600">V17</span></h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">SaaS Prototype | 費用含稅自動換算版</p>
                </div>
            </div>
            <button onclick="window.print()" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-black py-3 px-10 rounded-2xl shadow-2xl transition-all flex items-center justify-center gap-2">
                <i class="fas fa-print"></i> 產出單頁 PDF 報告
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <aside class="lg:col-span-4 space-y-4 no-print">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-200">
                    <h3 class="text-sm font-black text-slate-800 mb-4 uppercase border-b-2 border-blue-500 pb-2 italic">參數與費用設定</h3>
                    
                    <div class="space-y-4">
                        <div class="grid grid-cols-1 gap-1 text-[12px] font-bold text-slate-600">
                            <label class="flex items-center gap-2"><input type="checkbox" checked class="mode-toggle" onchange="calculate()" data-mode="sh"> 社會住宅 (代管)</label>
                            <label class="flex items-center gap-2"><input type="checkbox" checked class="mode-toggle" onchange="calculate()" data-mode="pi"> 公益出租人</label>
                            <label class="flex items-center gap-2"><input type="checkbox" checked class="mode-toggle" onchange="calculate()" data-mode="self"> 房東自租自管</label>
                            <label class="flex items-center gap-2 text-blue-700"><input type="checkbox" checked class="mode-toggle" onchange="calculate()" data-mode="big_m"> 大管家代管 (法人)</label>
                            <label class="flex items-center gap-2 text-orange-700"><input type="checkbox" checked class="mode-toggle" onchange="calculate()" data-mode="orange"> 橘公寓代管 (法人)</label>
                        </div>

                        <div class="p-4 bg-orange-50 rounded-2xl border border-orange-100 space-y-3">
                            <span class="text-[9px] font-black text-orange-600 uppercase">軌道 A：租金 & 稅率</span>
                            <div class="flex gap-2">
                                <input type="number" id="rentA" value="29000" class="w-2/3 p-2 rounded-lg border-2 border-orange-200 font-black" oninput="calculate()">
                                <select id="rentTaxA" class="w-1/3 text-[10px] font-bold rounded-lg border-orange-200" onchange="calculate()"><option value="inc">含稅</option><option value="ex">未稅</option></select>
                            </div>
                            <input type="number" id="taxRateA" value="12" class="w-full p-2 rounded-lg border-2 border-orange-200 font-black" oninput="calculate()" placeholder="稅率%">
                        </div>

                        <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100 space-y-3">
                            <span class="text-[9px] font-black text-blue-600 uppercase">軌道 B：租金 & 稅率</span>
                            <div class="flex gap-2">
                                <input type="number" id="rentB" value="40000" class="w-2/3 p-2 rounded-lg border-2 border-blue-200 font-black" oninput="calculate()">
                                <select id="rentTaxB" class="w-1/3 text-[10px] font-bold rounded-lg border-blue-200" onchange="calculate()"><option value="inc">含稅</option><option value="ex" selected>未稅</option></select>
                            </div>
                            <input type="number" id="taxRateB" value="20" class="w-full p-2 rounded-lg border-2 border-blue-200 font-black" oninput="calculate()" placeholder="稅率%">
                        </div>

                        <div class="p-4 bg-slate-100 rounded-2xl border border-slate-200 space-y-3">
                            <span class="text-[9px] font-black text-slate-500 uppercase">其他附加費用</span>
                            <div class="flex gap-2">
                                <input type="number" id="mgtFeeInput" value="2500" class="w-2/3 p-2 rounded-lg border-2 border-slate-300 font-black" oninput="calculate()" placeholder="管理費">
                                <select id="mgtTax" class="w-1/3 text-[10px] font-bold rounded-lg border-slate-300" onchange="calculate()"><option value="inc">含稅</option><option value="ex">未稅</option></select>
                            </div>
                            <div class="flex gap-2">
                                <input type="number" id="parkingFeeInput" value="3000" class="w-2/3 p-2 rounded-lg border-2 border-slate-300 font-black" oninput="calculate()" placeholder="車位費">
                                <select id="parkingTax" class="w-1/3 text-[10px] font-bold rounded-lg border-slate-300" onchange="calculate()"><option value="inc">含稅</option><option value="ex">未稅</option></select>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <div class="lg:col-span-8 space-y-6">
                <div class="main-card bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                    <div class="table-scroll" id="tableContainer"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 no-print">
                    <div class="bg-blue-50 p-5 rounded-3xl border border-blue-100 text-[11px] font-bold text-blue-900">
                        <h4 class="mb-2 border-b border-blue-200 pb-1">⚖️ 所得稅算法詳解</h4>
                        <ul class="space-y-1">
                            <li>● 社宅：[(月租-1.5萬) × 40%] × 12 × 稅率</li>
                            <li>● 公益：[(月租-1.5萬) × 57%] × 12 × 稅率</li>
                            <li>● 代管：[(6k-20k部分×47%) + (20k以上部分×57%)] × 12 × 稅率</li>
                        </ul>
                    </div>
                    <div class="bg-slate-100 p-5 rounded-3xl border border-slate-200 text-[11px] font-bold">
                        <h4 class="mb-2 border-b border-slate-300 pb-1">💡 計算備註</h4>
                        <ul class="space-y-1">
                            <li>● 未稅勾選：金額自動 × 1.05 以利潤基準計算</li>
                            <li>● 法人：包含 10% 預扣所得稅與 2.11% 補充保費</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    function format(num) { return Math.round(num).toLocaleString(); }
    function getVal(id) { return parseFloat(document.getElementById(id).value) || 0; }
    function isEx(id) { return document.getElementById(id).value === 'ex'; }

    function calculate() {
        // 含稅/未稅處理
        const baseRentA = getVal('rentA');
        const rentA = isEx('rentTaxA') ? baseRentA * 1.05 : baseRentA;
        const taxA = getVal('taxRateA') / 100;

        const baseRentB = getVal('rentB');
        const rentB = isEx('rentTaxB') ? baseRentB * 1.05 : baseRentB;
        const taxB = getVal('taxRateB') / 100;

        const mgtFee = isEx('mgtTax') ? getVal('mgtFeeInput') * 1.05 : getVal('mgtFeeInput');
        const parkingFee = isEx('parkingTax') ? getVal('parkingFeeInput') * 1.05 : getVal('parkingFeeInput');

        const hVal = 600000; const lVal = 500000; 
        const active = Array.from(document.querySelectorAll('.mode-toggle:checked')).map(e => e.getAttribute('data-mode'));

        const all = [
            { id: 'sh', name: "社會住宅 (代管)", m: rentA * 0.9, r: taxA, type: 'sh' },
            { id: 'pi', name: "公益出租人", m: rentA, r: taxA, type: 'pi' },
            { id: 'self', name: "房東自租自管", m: rentA, r: taxA, type: 'self' },
            { id: 'big_m', name: "大管家代管 (法人)", m: rentB, r: taxB, type: 'big_m' },
            { id: 'orange', name: "橘公寓代管 (法人)", m: rentB, r: taxB, type: 'orange' }
        ];

        const modes = all.filter(m => active.includes(m.id));
        if (modes.length === 0) { document.getElementById('tableContainer').innerHTML = "<p class='p-10 text-center text-slate-400'>請勾選比較模式</p>"; return; }

        let html = `<table class="w-full text-left min-w-[1000px]"><thead><tr class="bg-slate-900 text-white text-[11px] font-black">
            <th class="p-4 border-r border-slate-700">財務分析項目</th>` + 
            modes.map(m => `<th class="text-center p-4">${m.name}</th>`).join('') + `</tr></thead><tbody>`;

        const results = modes.map(m => {
            let taxM = 0; let hT = 0; let lT = 0; let mf = 0; let nhi = 0; let wh = 0;
            if (m.type === 'sh') {
                taxM = Math.max(0, m.m - 15000) * 0.4; hT = hVal * 0.012; lT = lVal * 0.002;
            } else if (m.type === 'pi') {
                taxM = Math.max(0, m.m - 15000) * 0.57; hT = hVal * 0.012; lT = lVal * 0.002;
            } else if (m.type === 'self') {
                taxM = m.m * 0.57; hT = hVal * 0.024; lT = lVal * 0.01;
            } else {
                // 代管修正公式：[(6k-20k * 47%) + (>20k * 57%)]
                taxM = Math.max(0, Math.min(m.m, 20000) - 6000) * 0.47 + Math.max(0, m.m - 20000) * 0.57;
                hT = (m.type === 'orange') ? hVal * 0.03 : hVal * 0.024; lT = lVal * 0.01;
                wh = m.m * 12 * 0.1; nhi = m.m * 12 * 0.0211; 
                mf = (m.type === 'big_m') ? m.m * 0.1 * 12 : m.m;
            }
            const itax = taxM * 12 * m.r;
            // 淨利包含：租金+管理+車位 - 各種稅費與物管費
            const net = ((m.m + mgtFee + parkingFee) * 12) - itax - hT - lT - mf - nhi;
            return { m: m.m, mgt: mgtFee, pkg: parkingFee, g: (m.m + mgtFee + parkingFee) * 12, wh, nhi, itax, hT, lT, mf, net };
        });

        const rows = [
            { l: "📍 簽約月租金", k: "m", c: "rent-row" },
            { l: "🏢 管理費收入", k: "mgt" },
            { l: "🚗 車位費收入", k: "pkg" },
            { l: "年度總收入 (Gross)", k: "g", c: "base-row" },
            { l: "- 法人預扣 (10%)", k: "wh", color: "text-red-700 font-bold" },
            { l: "- 二代健保 (2.11%)", k: "nhi", color: "text-red-700 font-bold" },
            { l: "年度應繳所得稅額", k: "itax", color: "income-tax" },
            { l: "年度房屋稅", k: "hT", color: "house-tax" },
            { l: "年度地價稅", k: "lT", color: "land-tax" },
            { l: "年度物管服務費", k: "mf", color: "text-slate-500 font-bold" },
            { l: "💰 最終淨利 (實拿)", k: "net", c: "highlight-row" }
        ];

        rows.forEach(r => {
            html += `<tr class="${r.c || ''}"><td class="p-4 font-bold border-r border-slate-100">${r.l}</td>` + 
                results.map(res => {
                    const val = res[r.key]; const disp = (val === 0) ? "-" : "$" + format(val);
                    return `<td class="text-center font-bold ${r.color || ''} ${r.key==='net'?'text-xl':''}">${disp}</td>`;
                }).join('') + `</tr>`;
        });
        document.getElementById('tableContainer').innerHTML = html + "</tbody></table>";
    }
    window.onload = calculate;
</script>
</body>
</html>
